services:
  postgres:
    image: postgres:16-alpine
    container_name: core_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: core_db
      POSTGRES_USER: core_user
      POSTGRES_PASSWORD: core_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U core_user -d core_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - core_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: core_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/core_db
      SPRING_DATASOURCE_USERNAME: core_user
      SPRING_DATASOURCE_PASSWORD: core_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      SPRING_PROFILES_ACTIVE: prod
    ports:
      - "8080:8080"
    volumes:
      - ./backend/src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - core_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: core_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - core_network

volumes:
  postgres_data:
    driver: local

networks:
  core_network:
    driver: bridge
